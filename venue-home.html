<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venue – Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Venue design tokens ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0cbb5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 32px 16px 64px;
      font-family: 'Poppins', sans-serif;
    }

    /* ── Phone shell ── */
    .phone {
      width: 390px;
      height: 812px;
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(101,77,78,0.25);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Full-bleed background room photo */
    .bg-photo {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 48px;
      z-index: 0;
    }

    /* All content layers above bg */
    .phone > *:not(.bg-photo) { position: relative; z-index: 1; }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px 6px;
      font-size: 12px; font-weight: 700; color: #654D4E;
    }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .status-icons svg { width: 15px; height: 15px; }

    /* ── Top bar ── */
    .top-bar {
      width: 100%;
      height: 37px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 4px;
    }
    .top-side { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .icon-btn {
      width: 37px; height: 37px;
      border-radius: 18px;
      background: rgba(255,255,255,0.55);
      box-shadow: 0 0 20px rgba(232,130,107,0.3);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; cursor: pointer; border: none;
      flex-shrink: 0;
    }
    .icon-btn img { width: 22px; height: 22px; object-fit: contain; }
    .icon-btn svg { width: 18px; height: 18px; color: #654D4E; opacity: 0.6; }

    .currency-pill {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      background: white;
      border-radius: 50px; height: 34px;
      padding: 0 12px;
      box-shadow: 0 0 20px rgba(232,130,107,0.4);
    }
    .currency { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; color: #654D4E; }
    .currency img { width: 22px; height: 22px; object-fit: contain; }

    /* ── Offers row ── */
    .offers-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px 4px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .offers-row::-webkit-scrollbar { display: none; }

    /* Salon aesthetic card */
    @keyframes glint {
      0%   { transform: translateX(-120%) skewX(-20deg); opacity: 0; }
      15%  { opacity: 0.7; }
      40%  { transform: translateX(200%) skewX(-20deg); opacity: 0; }
      100% { transform: translateX(200%) skewX(-20deg); opacity: 0; }
    }
    @keyframes tutorialPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,194,38,0.5); }
      50%       { box-shadow: 0 0 0 4px rgba(255,194,38,0.3); }
    }
    .aesthetic-card {
      flex-shrink: 0;
      width: 160px; height: 81px;
      border-radius: 30px;
      background: linear-gradient(152deg, #ffc1af 0%, #fdfdfd 55%, #fff 81%);
      border: 2px solid white;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }
    .aesthetic-card.tutorial-active {
      border-color: #FFC226;
      animation: tutorialPulse 1.8s ease-in-out infinite;
    }
    .aesthetic-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.75) 50%, transparent);
      transform: translateX(-120%) skewX(-20deg);
      pointer-events: none;
    }
    .aesthetic-card.tutorial-active::after {
      animation: glint 2.4s ease-in-out infinite;
    }
    .aesthetic-tags {
      position: absolute;
      top: 10px; left: 12px;
      display: flex; flex-direction: column; gap: 1px;
    }
    .aesthetic-tag {
      font-size: 9px; font-weight: 600;
      color: #A3898C;
    }
    .aesthetic-label {
      position: absolute;
      bottom: 8px; left: 0; right: 0;
      text-align: center;
      font-size: 9px; font-weight: 700;
      color: #654D4E;
    }
    /* Decorative petal/heart shapes */
    .petal {
      position: absolute;
      object-fit: contain;
      pointer-events: none;
    }

    /* Offer cards */
    .offer-card {
      flex-shrink: 0;
      width: 75px; height: 80px;
      border-radius: 29px;
      overflow: visible;
      position: relative;
      cursor: pointer;
    }
    .offer-card-inner {
      width: 75px; height: 80px;
      border-radius: 29px;
      overflow: hidden;
      position: relative;
    }
    .offer-card img.offer-bg {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      object-fit: cover;
    }
    .offer-card img.offer-front {
      width: 140%; height: 140%;
      position: absolute;
      top: -25%; left: -20%;
      object-fit: contain;
    }
    .offer-label {
      position: absolute;
      bottom: 6px; left: 0; right: 0;
      text-align: center;
      font-size: 7.5px; font-weight: 700;
      color: #654D4E;
    }
    .offer-timer {
      position: absolute;
      top: -8px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 2px;
      background: white;
      border-radius: 20px;
      padding: 2px 5px;
      font-size: 7px; font-weight: 700; color: #A3898C;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      z-index: 2;
    }
    .offer-timer svg { width: 7px; height: 7px; }

    /* ── Main area (room photo space) ── */
    .main-spacer { flex: 1; }

    /* ── Salon progress banner ── */
    .salon-banner {
      margin: 0 7px 6px;
      height: 63px;
      border-radius: 30px;
      background: linear-gradient(169deg, #EF9180 0%, #E8826B 81%);
      box-shadow: 0 3px 4px rgba(239,145,128,0.3), 0 3px 4px rgba(101,77,78,0.1);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
    }
    .salon-banner { transition: transform 0.08s; }
    .salon-banner:active { transform: scale(0.98); }
    .banner-inset {
      position: absolute; inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 -6px 0 0 #c96059;
      pointer-events: none;
    }
    .banner-avatars { display: flex; flex-shrink: 0; }
    .banner-av {
      width: 21px; height: 20px;
      border-radius: 50%;
      overflow: hidden;
      margin-left: -6px;
    }
    .banner-av:first-child { margin-left: 0; }
    .banner-av img { width: 100%; height: 100%; object-fit: cover; }
    .banner-content { flex: 1; min-width: 0; }
    .banner-title {
      font-size: 12px; font-weight: 700; color: white;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.2;
    }
    .banner-progress-wrap {
      margin-top: 4px;
      background: #2d6c71;
      border-radius: 10px;
      height: 16px;
      position: relative;
      overflow: visible;
      margin-right: 22px;
    }
    .banner-progress-fill {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 65%;
      background: linear-gradient(to bottom, #FFC226, #F59E4D);
      border-radius: 10px;
    }
    .banner-progress-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: white;
    }
    .banner-gift {
      position: absolute;
      right: -19px;
      bottom: 0;
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    /* Stylebook progress row with gift icon */
    .stylebook-progress-row {
      display: flex;
      align-items: center;
    }
    .stylebook-progress-row .stylebook-progress-wrap {
      flex: 1;
      overflow: visible;
    }
    .stylebook-gift {
      position: absolute;
      right: -10px;
      bottom: 0;
      width: 32px; height: 32px;
      object-fit: contain;
    }

    /* ── Action row: Stylebook + Play ── */
    .action-row {
      display: flex;
      gap: 8px;
      padding: 0 7px 8px;
      flex-shrink: 0;
    }

    /* Teal "Salon Stylebook" button */
    .btn-stylebook {
      flex: 1;
      height: 63px;
      border-radius: 30px;
      background: linear-gradient(158deg, #77DBD2 0%, #69BFCC 81%);
      box-shadow: 0 3px 4px rgba(88,173,185,0.3), 0 3px 4px rgba(101,77,78,0.1);
      position: relative;
      overflow: visible;
      padding: 10px 14px 10px 14px;
      cursor: pointer;
      border: none;
      font-family: 'Poppins', sans-serif;
      display: flex; flex-direction: column; justify-content: center;
    }
    .btn-stylebook::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 -6px 0 0 rgba(88,173,185,0.8);
      pointer-events: none;
    }
    .btn-stylebook:active {
      transform: translateY(3px);
      box-shadow: 0 1px 2px rgba(88,173,185,0.2);
    }
    .stylebook-label {
      font-size: 13px; font-weight: 700; color: white;
      text-align: center; line-height: 1;
      margin-bottom: 5px;
    }
    .stylebook-progress-wrap {
      background: #2d6c71;
      border-radius: 10px;
      height: 16px;
      position: relative;
      overflow: visible; /* gift icon escapes; fill is clipped by its own border-radius */
    }
    .stylebook-progress-fill {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 47%;
      background: linear-gradient(to bottom, #FFC226, #F59E4D);
      border-radius: 10px;
    }
    .stylebook-progress-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: white;
    }
    .stylebook-badge {
      position: absolute;
      top: -6px; right: -6px;
      width: 22px; height: 22px;
      background: #E8826B;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      border: 2px solid white;
    }

    /* Gold "Play" button */
    .btn-play {
      flex: 1;
      height: 63px;
      border-radius: 30px;
      border: none; cursor: pointer;
      background: linear-gradient(163deg, #FFC226 20%, #F59E4D 99%);
      box-shadow: 0 3px 4px rgba(242,160,59,0.3), 0 3px 4px rgba(101,77,78,0.1),
                  inset 0 -4px 0 rgba(225,127,54,0.3);
      font-size: 18px; font-weight: 700; color: white;
      font-family: 'Poppins', sans-serif;
    }
    .btn-play:active {
      transform: translateY(3px);
      box-shadow: 0 1px 2px rgba(242,160,59,0.2), inset 0 -1px 0 rgba(225,127,54,0.3);
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      width: 100%; height: 75px;
      background: white;
      border-radius: 30px 30px 0 0;
      box-shadow: 0 -5px 35px 0 #ffe4d6;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 17px;
      flex-shrink: 0;
    }
    .nav-item { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .nav-item img { width: 26px; height: 26px; object-fit: contain; opacity: 0.45; }
    .nav-item.active img { opacity: 1; }
    .nav-vip { width: 56px; height: 56px; position: relative; display: flex; align-items: center; justify-content: center; }
    .vip-circle { width: 45px; height: 45px; border-radius: 50%; overflow: hidden; }
    .vip-circle img { width: 100%; height: 100%; object-fit: cover; }
    .vip-badge { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); background: #ffe147; color: #bf611a; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 20px; white-space: nowrap; }
  </style>
</head>
