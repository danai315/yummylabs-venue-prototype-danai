<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venue – Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e8b89e;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; padding: 32px 16px 64px;
      font-family: 'Poppins', sans-serif;
    }

    .phone {
      width: 390px; height: 812px;
      border-radius: 48px; overflow: hidden;
      box-shadow: 0 28px 72px rgba(101,77,78,0.28);
      position: relative; background: #FEDECF;
    }

    /* Full-bleed background art */
    .bg-art {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
      z-index: 0;
    }

    /* Top peach gradient fade */
    .top-gradient {
      position: absolute; top: 0; left: 0; right: 0; height: 320px;
      background: linear-gradient(to bottom, #FEDECF 0%, rgba(254,222,207,0.6) 50%, transparent 100%);
      z-index: 1;
    }

    /* Bottom dark overlay for buttons */
    .bottom-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; height: 420px;
      background: linear-gradient(to top, rgba(101,77,78,0.88) 0%, rgba(101,77,78,0.55) 50%, transparent 100%);
      z-index: 1;
    }

    /* Logo */
    .logo-wrap {
      position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
      z-index: 2; width: 210px;
    }
    .logo-wrap img { width: 100%; display: block; }

    /* Status bar */
    .status-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 28px 0; z-index: 3;
      font-size: 12px; font-weight: 700; color: #654D4E;
    }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .status-icons svg { width: 14px; height: 14px; }

    /* Button area */
    .btn-area {
      position: absolute; bottom: 60px; left: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 16px;
      z-index: 2;
    }

    .btn-signin {
      width: 100%; height: 56px; border-radius: 50px;
      background: linear-gradient(173deg, #FFC226 20%, #F59E4D 99%);
      box-shadow: 0 4px 6px rgba(242,160,59,0.35), inset 0 -5px 0 rgba(203,126,79,0.4);
      border: none; cursor: pointer;
      font-size: 18px; font-weight: 800; color: white;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.3px;
      text-shadow: 0 -2px 0 rgba(193,124,75,0.5);
    }
    .btn-signin:active { transform: translateY(3px); box-shadow: 0 1px 2px rgba(242,160,59,0.2), inset 0 -2px 0 rgba(203,126,79,0.4); }

    .btn-guest {
      width: 100%; height: 56px; border-radius: 50px;
      border: 3px solid rgba(255,255,255,0.9);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      font-size: 16px; font-weight: 700; color: white;
      letter-spacing: 0.2px;
    }

    /* Tagline */
    .tagline {
      position: absolute; bottom: 200px; left: 0; right: 0;
      text-align: center; z-index: 2;
      font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.8);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- Status bar -->
    <div class="status-bar">
      <span style="color:white; opacity:0.9;">9:41</span>
      <div class="status-icons" style="color:white; opacity:0.9;">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="8" width="3" height="13" rx="1"/><rect x="7" y="5" width="3" height="16" rx="1"/><rect x="12" y="2" width="3" height="19" rx="1"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="11" rx="2"/><path d="M22 11v3" stroke-width="3" stroke-linecap="round"/></svg>
      </div>
    </div>

    <!-- Background art photo -->
    <img class="bg-art" src="https://www.figma.com/api/mcp/asset/fe789dbc-a99f-4708-b6f4-246ce4b6a554" alt="" />

    <!-- Gradients -->
    <div class="top-gradient"></div>
    <div class="bottom-overlay"></div>

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="https://www.figma.com/api/mcp/asset/4eeb43fd-2ff2-43fb-98ed-04516212ac37" alt="VENUE" />
    </div>

    <!-- Tagline -->
    <div class="tagline">Design. Compete. Belong.</div>

    <!-- Buttons -->
    <div class="btn-area">
      <button class="btn-signin">Sign In</button>
      <a href="venue-salon-popup.html" class="btn-guest">Play as Guest</a>
    </div>

  </div>
</body>
</html>
