<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venue – Design Reaction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0cbb5;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; padding: 32px 16px 64px;
      font-family: 'Poppins', sans-serif;
    }

    .phone {
      width: 390px; height: 812px;
      background: #FEDECF;
      border-radius: 48px; overflow: hidden;
      box-shadow: 0 24px 64px rgba(101,77,78,0.2);
      display: flex; flex-direction: column;
      position: relative;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 28px 8px;
      font-size: 12px; font-weight: 700; color: #654D4E;
      flex-shrink: 0;
    }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .status-icons svg { width: 15px; height: 15px; }

    /* ── Top bar ── */
    .top-bar {
      width: 100%; height: 50px;
      background: #FEDECF;
      display: flex; align-items: center;
      padding: 0 14px; gap: 8px; flex-shrink: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; flex-shrink: 0; text-decoration: none;
    }
    .back-btn svg { width: 18px; height: 18px; color: #654D4E; }
    .currency-pill {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 14px; background: white; border-radius: 50px; height: 34px;
      padding: 0 16px; box-shadow: 0 1px 6px rgba(101,77,78,0.08);
    }
    .currency { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: #654D4E; }
    .currency .icon { font-size: 15px; }
    .action-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none;
    }
    .action-btn svg { width: 18px; height: 18px; color: #654D4E; opacity: 0.55; }

    /* ── Scrollable content ── */
    .content {
      flex: 1; min-height: 0;
      overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column;
      background: white;
      border-radius: 30px 30px 0 0;
    }
    .content::-webkit-scrollbar { display: none; }

    /* ── Hero image ── */
    .hero-wrap {
      position: relative; flex-shrink: 0;
      width: 100%; height: 320px; overflow: hidden;
      border-radius: 30px 30px 0 0;
    }
    .hero-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .hero-star-badge {
      position: absolute; bottom: 14px; right: 14px;
      background: white; border-radius: 50px;
      display: flex; align-items: center; gap: 4px;
      padding: 6px 12px;
      font-size: 13px; font-weight: 700; color: #644229;
      box-shadow: 0 2px 8px rgba(101,77,78,0.15);
    }
    .hero-star-badge .star-icon { font-size: 14px; }

    /* ── Title + tags ── */
    .title-section {
      padding: 20px 20px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .design-title {
      font-size: 22px; font-weight: 700; color: #EF9180;
      text-align: center; line-height: 1.2;
    }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .tag {
      background: rgba(239,145,128,0.15); color: #EF9180;
      font-size: 11px; font-weight: 600; padding: 5px 14px; border-radius: 50px;
    }

    /* ── Reaction card ── */
    .reaction-section {
      padding: 0 16px 24px;
      flex-shrink: 0;
    }
    .reaction-card {
      background: linear-gradient(180deg, #FFAD2F 0%, #FFC226 100%);
      border-radius: 30px; padding: 14px 10px 10px;
    }
    .reaction-card-label {
      font-size: 13px; font-weight: 600; color: white;
      margin-bottom: 10px; padding-left: 6px;
    }
    .reaction-panel {
      background: white; border-radius: 22px;
      padding: 18px 8px 14px;
      display: flex; justify-content: space-around; align-items: flex-start;
    }
    .reaction-item {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      flex: 1; cursor: pointer; user-select: none;
      transition: transform 0.15s;
      position: relative;
    }
    .reaction-item:active { transform: scale(0.92); }
    .reaction-emoji {
      font-size: 34px; line-height: 1;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: block;
    }
    .reaction-item.popped .reaction-emoji {
      animation: emojiBounce 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .reaction-label { font-size: 10px; font-weight: 600; color: #A3898C; }
    .reaction-count {
      font-size: 12px; font-weight: 700; color: #654D4E;
      transition: all 0.2s;
    }
    .reaction-item.voted .reaction-count { color: #EF9180; }
    .reaction-item.voted .reaction-label { color: #EF9180; }

    @keyframes emojiBounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.5) rotate(-8deg); }
      55%  { transform: scale(0.9) rotate(5deg); }
      75%  { transform: scale(1.15) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* ── Burst particles ── */
    .burst-particle {
      position: fixed;
      pointer-events: none;
      font-size: 22px;
      z-index: 9999;
      animation: burstFloat 0.9s ease-out both;
    }
    @keyframes burstFloat {
      0%   { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.4) rotate(var(--tr)); }
    }

    /* ── Count pop ── */
    @keyframes countPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.4); color: #EF9180; }
      100% { transform: scale(1); }
    }
    .count-animating {
      animation: countPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* ── Who reacted ── */
    .who-reacted {
      padding: 0 16px 20px; flex-shrink: 0;
    }
    .who-label {
      font-size: 13px; font-weight: 700; color: #654D4E;
      margin-bottom: 10px;
    }
    .who-list { display: flex; flex-direction: column; gap: 8px; }
    .who-row {
      display: flex; align-items: center; gap: 10px;
    }
    .who-av {
      width: 36px; height: 36px; border-radius: 50%; overflow: hidden;
      background: #f0e6e0; flex-shrink: 0;
    }
    .who-av img { width: 100%; height: 100%; object-fit: cover; }
    .who-name { font-size: 13px; font-weight: 600; color: #654D4E; flex: 1; }
    .who-emoji { font-size: 18px; }

    /* ── Bottom nav ── */
    .bottom-nav {
      width: 100%; height: 75px; background: white;
      border-radius: 30px 30px 0 0;
      box-shadow: 0 -5px 35px 0 #ffe4d6;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 17px; flex-shrink: 0;
    }
    .nav-item {
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .nav-item img { width: 26px; height: 26px; object-fit: contain; opacity: 0.45; }
    .nav-item.active img { opacity: 1; }
    .nav-vip {
      width: 56px; height: 56px; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .vip-circle { width: 45px; height: 45px; border-radius: 50%; overflow: hidden; }
    .vip-circle img { width: 100%; height: 100%; object-fit: cover; }
    .vip-badge {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      background: #ffe147; color: #bf611a;
      font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 20px; white-space: nowrap;
    }
  </style>
</head>
<body>

  <script>
    const scrollArea = document.querySelector('.content, .scroll-content, main');
    if (scrollArea) {
      scrollArea.addEventListener('scroll', function() {
        const bar = document.querySelector('.top-bar');
        if (!bar) return;
        if (this.scrollTop > 10) {
          bar.style.transform = 'translateY(-100%)';
          bar.style.opacity = '0';
          bar.style.pointerEvents = 'none';
        } else {
          bar.style.transform = '';
          bar.style.opacity = '';
          bar.style.pointerEvents = '';
        }
      });
    }
  </script>
  <script>
    function handleReaction(item) {
      const emoji = item.dataset.emoji;
      const countEl = item.querySelector('.reaction-count');
      const emojiEl = item.querySelector('.reaction-emoji');

      // Toggle voted state
      const wasVoted = item.classList.contains('voted');
      // Un-vote all others in same panel
      document.querySelectorAll('.reaction-item').forEach(el => {
        if (el !== item && el.classList.contains('voted')) {
          el.classList.remove('voted');
          el.querySelector('.reaction-count').textContent =
            parseInt(el.querySelector('.reaction-count').textContent) - 1;
        }
      });

      if (wasVoted) {
        item.classList.remove('voted');
        countEl.textContent = parseInt(countEl.textContent) - 1;
        return;
      }

      item.classList.add('voted');
      countEl.textContent = parseInt(countEl.textContent) + 1;

      // Bounce animation
      emojiEl.style.animation = 'none';
      emojiEl.offsetHeight; // reflow
      emojiEl.style.animation = 'emojiBounce 0.45s cubic-bezier(0.34,1.56,0.64,1) both';

      // Count pop
      countEl.classList.remove('count-animating');
      countEl.offsetHeight;
      countEl.classList.add('count-animating');
      countEl.addEventListener('animationend', () => countEl.classList.remove('count-animating'), { once: true });

      // Burst particles
      spawnBurst(emoji, emojiEl);
    }

    function spawnBurst(emoji, sourceEl) {
      const rect = sourceEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const count = 8;

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('span');
        particle.className = 'burst-particle';
        particle.textContent = emoji;

        const angle = (i / count) * 360 + Math.random() * 30;
        const dist = 50 + Math.random() * 70;
        const rad = (angle * Math.PI) / 180;
        const tx = Math.cos(rad) * dist;
        const ty = Math.sin(rad) * dist - 40; // bias upward
        const tr = (Math.random() - 0.5) * 60 + 'deg';
        const delay = Math.random() * 0.12;
        const duration = 0.7 + Math.random() * 0.3;

        particle.style.cssText = `
          left: ${cx}px; top: ${cy}px;
          --tx: ${tx}px; --ty: ${ty}px; --tr: ${tr};
          animation-duration: ${duration}s;
          animation-delay: ${delay}s;
          font-size: ${14 + Math.random() * 12}px;
          margin-left: -12px; margin-top: -12px;
        `;
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), (delay + duration) * 1000 + 100);
      }
    }
  </script>
