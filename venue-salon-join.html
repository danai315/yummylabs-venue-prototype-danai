<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venue – Salon Join</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Venue design tokens ────────────────────────────────────────────────
       #EF9180  coral accent       #84C9C9  teal
       #654D4E  dark brown text    #FFC236  gold CTA
       #F59E4D  amber              #72DA8E  green
       #F6EEE6  cream              #FEDECF  app background
       Font: Poppins 400 / 600 / 700
    ─────────────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0cbb5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 32px 16px 64px;
      font-family: 'Poppins', sans-serif;
    }

    .phone {
      width: 390px;
      height: 812px;
      background: #FEDECF;
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(101,77,78,0.2);
      display: flex;
      flex-direction: column;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px 8px;
      font-size: 12px;
      font-weight: 700;
      color: #654D4E;
    }
    .status-icons { display: flex; align-items: center; gap: 6px; }
    .status-icons svg { width: 15px; height: 15px; }

    /* ── Top bar: back + currency + actions ── */
    .top-bar {
      width: 100%;
      height: 50px;
      border-radius: 40px 40px 0 0;
      background: #FEDECF;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
    }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; flex-shrink: 0;
    }
    .back-btn svg { width: 18px; height: 18px; color: #654D4E; }

    .currency-pill {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: white;
      border-radius: 50px;
      height: 34px;
      padding: 0 16px;
      box-shadow: 0 1px 6px rgba(101,77,78,0.08);
    }
    .currency {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 700; color: #654D4E;
    }
    .currency .icon { font-size: 15px; }

    .bar-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .action-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative; border: none;
    }
    .action-btn svg { width: 18px; height: 18px; color: #654D4E; opacity: 0.55; }
    .notif-dot {
      position: absolute; top: 2px; right: 2px;
      width: 14px; height: 14px;
      background: #EF9180; border-radius: 50%; border: 2px solid white;
      font-size: 8px; font-weight: 700; color: white;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Scrollable content area ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 15px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ── Popup card ── */
    .popup-card {
      background: white;
      border-radius: 40px;
      overflow: hidden;
      box-shadow:
        0 6px 0 0 #e7d9ce,
        0 0 30px 0 rgba(101,77,78,0.3);
      display: flex;
      flex-direction: column;
    }

    /* Hero image section */
    .popup-image {
      position: relative;
      height: 310px;
      overflow: hidden;
      border-radius: 40px 40px 0 0;
    }
    .popup-image img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .image-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 100%);
    }
    .close-btn {
      position: absolute;
      top: 16px; right: 16px;
      width: 44px; height: 44px;
      cursor: pointer;
    }
    .close-btn img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    /* Content section */
    .popup-content {
      padding: 8px 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .popup-title {
      font-size: 20px; font-weight: 700;
      color: #EF9180;
      text-align: center;
      line-height: 1.3;
    }

    .popup-tags {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    .popup-tag {
      background: rgba(239,145,128,0.15);
      color: #EF9180;
      font-size: 12px; font-weight: 600;
      padding: 6px 20px;
      border-radius: 50px;
    }

    .popup-checklist {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }
    .check-item {
      font-size: 12px; font-weight: 600;
      color: rgba(190,52,37,0.65);
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }
    .check-item .checkmark {
      flex-shrink: 0;
      font-size: 13px;
    }

    /* Teal confirm button */
    .btn-confirm {
      width: 100%; height: 48px;
      border-radius: 32px;
      border: none; cursor: pointer;
      background: linear-gradient(168deg, #77DBD2 11%, #69BFCC 79%);
      box-shadow:
        0 3px 4px 0 rgba(88,173,185,0.3),
        0 3px 4px 0 rgba(101,77,78,0.1),
        inset 0 -4px 0 0 rgba(88,173,185,0.8);
      font-size: 16px; font-weight: 700;
      color: white;
      font-family: 'Poppins', sans-serif;
      margin-top: 4px;
    }

    /* ── Entrance animations ── */

    /* Card springs up with a bouncy overshoot */
    @keyframes cardSpring {
      0%   { opacity: 0; transform: scale(0.88) translateY(32px); }
      55%  { opacity: 1; transform: scale(1.025) translateY(-7px); }
      75%  { transform: scale(0.99) translateY(3px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Individual items drift up from below */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Sparkle floaters rise and vanish */
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0) rotate(-10deg); }
      22%  { opacity: 1; transform: translateY(-14px) scale(1.15) rotate(8deg); }
      100% { opacity: 0; transform: translateY(-64px) scale(0.6) rotate(30deg); }
    }

    /* Confirm button breathes with a soft teal glow */
    @keyframes btnGlow {
      0%, 100% { box-shadow:
        0 3px 4px rgba(88,173,185,0.3),
        0 3px 4px rgba(101,77,78,0.1),
        inset 0 -4px 0 rgba(88,173,185,0.8); }
      50% { box-shadow:
        0 3px 4px rgba(88,173,185,0.3),
        0 3px 4px rgba(101,77,78,0.1),
        inset 0 -4px 0 rgba(88,173,185,0.8),
        0 0 0 8px rgba(119,219,210,0.18),
        0 10px 28px rgba(88,173,185,0.32); }
    }

    /* Apply animations */
    .popup-card {
      animation: cardSpring 0.68s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .popup-title {
      animation: fadeUp 0.38s ease both 0.48s;
    }
    .popup-tags {
      animation: fadeUp 0.38s ease both 0.62s;
    }
    .popup-checklist {
      animation: fadeUp 0.38s ease both 0.76s;
    }
    .btn-confirm {
      animation:
        fadeUp 0.38s ease both 0.92s,
        btnGlow 2.4s ease-in-out 1.5s infinite;
    }

    /* Floating sparkle decorations */
    .sparkles-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }
    .sparkles-wrap span {
      position: absolute;
      font-size: 18px;
      opacity: 0;
      animation: floatUp 1.5s ease-out both;
    }
    .sparkles-wrap span:nth-child(1) { left: 7%;   bottom: 54%; animation-delay: 0.58s; }
    .sparkles-wrap span:nth-child(2) { right: 9%;  bottom: 46%; animation-delay: 0.74s; }
    .sparkles-wrap span:nth-child(3) { left: 46%;  bottom: 60%; animation-delay: 0.90s; font-size: 13px; }
    .sparkles-wrap span:nth-child(4) { right: 22%; bottom: 36%; animation-delay: 1.06s; }
    .sparkles-wrap span:nth-child(5) { left: 24%;  bottom: 42%; animation-delay: 1.20s; font-size: 13px; }
    .sparkles-wrap span:nth-child(6) { left: 68%;  bottom: 52%; animation-delay: 1.34s; font-size: 11px; }

    /* ── Bottom nav (Venue component) ── */
    .bottom-nav {
      width: 100%; height: 75px;
      background: white;
      border-radius: 30px 30px 0 0;
      box-shadow: 0 -5px 35px 0 #ffe4d6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 17px;
      flex-shrink: 0;
    }
    .nav-item {
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .nav-item img { width: 26px; height: 26px; object-fit: contain; opacity: 0.45; }
    .nav-item.active img { opacity: 1; }
    .nav-vip {
      width: 56px; height: 56px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .vip-circle {
      width: 45px; height: 45px;
      border-radius: 50%; overflow: hidden;
    }
    .vip-circle img { width: 100%; height: 100%; object-fit: cover; }
    .vip-badge {
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      background: #ffe147; color: #bf611a;
      font-size: 8px; font-weight: 700;
      padding: 2px 6px; border-radius: 20px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- Status bar -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="8" width="3" height="13" rx="1"/><rect x="7" y="5" width="3" height="16" rx="1"/><rect x="12" y="2" width="3" height="19" rx="1"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33C16.4 22 17 21.4 17 20.67V5.33C17 4.6 16.4 4 15.67 4z"/></svg>

        <button class="action-btn" aria-label="Settings">

        </button>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="scroll-area">

      <!-- Floating sparkles (CSS-only, fade on load) -->
      <div class="sparkles-wrap" aria-hidden="true">
        <span>✨</span>
        <span>🌸</span>
        <span>🌟</span>
        <span>✨</span>
        <span>🌷</span>

      <!-- ── Modal popup card ── -->
      <div class="popup-card">

        <!-- Hero image with fade + close button -->
        <div class="popup-image">
          <img
            src="images/e61c6a3c-662e-48dc-8acb-fe59e1cb82bb.png"

        <!-- Content: title, tags, checklist, CTA -->
        <div class="popup-content">

          <div class="popup-title">Welcome to Earth Tone Studio</div>

          <div class="popup-tags">

          </div>

          <div class="popup-checklist">

            <div class="check-item">
              <span class="checkmark">✓</span>
              <span>Contribute to weekly goals for shared rewards</span>

          <a href="venue-home.html" class="btn-confirm" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">Confirm and Enter</a>

        </div>
      </div>

    </div><!-- end scroll-area -->

    <!-- Bottom nav (Venue component) -->
    <nav class="bottom-nav">
      <div class="nav-item">
        <img src="images/b53016b3-399b-4932-bac6-4812dfff0d71.png" alt="Store" />
      </div>
      <div class="nav-item">
        <img src="images/cb733038-ac96-492b-a059-5ed455014632.png" alt="Voting" />
      </div>
      <div class="nav-item active">
        <img src="images/fa3e315c-6cd4-4136-8191-30039588e819.png" alt="Home" />
      </div>
      <div class="nav-item">
        <img src="images/3efa7e93-8db3-43e7-8a59-f0b16c35e1e0.png" alt="Leaderboard" />
      </div>

        <div class="vip-circle">
          <img src="images/3bad60bb-1d30-418a-bcc6-60c3bceb5dd9.png" alt="VIP Avatar" />
        </div>
        <span class="vip-badge">👑 VIP</span>
      </div>
    </nav>

  </div>
</body>
</html>
